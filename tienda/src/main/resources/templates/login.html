<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1a40, #0f0f1a);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #8e44ad;
            filter: blur(120px);
            top: -100px;
            left: -100px;
            opacity: 0.4;
        }

        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #3498db;
            filter: blur(120px);
            bottom: -120px;
            right: -120px;
            opacity: 0.4;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .titulo {
            font-size: 30px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .subtitulo {
            font-size: 14px;
            color: #cfcfcf;
            margin-bottom: 25px;
        }

        .campo {
            text-align: left;
            margin-bottom: 15px;
        }

        .campo label {
            display: block;
            font-size: 13px;
            color: #ddd;
            margin-bottom: 6px;
        }

        .campo input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .campo input::placeholder {
            color: #aaa;
        }

        .campo input:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 10px rgba(155, 89, 182, 0.6);
        }

        .boton {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #8e44ad, #3498db);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .boton:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: #ffb3b3;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .registro {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #cfcfcf;
            font-size: 13px;
            transition: 0.3s;
        }

        .registro:hover {
            color: #9b59b6;
        }
    </style>
</head>

<body>

<div class="contenedor">
    <div class="tarjeta">

        <h2 class="titulo">Bienvenido</h2>
        <p class="subtitulo">Inicia sesión para continuar</p>

        <div th:if="${param.error}" class="error">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="error">
            Has cerrado sesión exitosamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="campo">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="boton">Entrar</button>
        </form>

        <a th:href="@{/register}" class="registro">
            ¿No tienes cuenta? Regístrate
        </a>

    </div>
</div>

</body>
</html>
