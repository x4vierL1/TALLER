<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            min-height: 100vh;
            padding: 30px;
            color: #e2e8f0;
        }

        .contenedor {
            max-width: 1100px;
            margin: auto;
        }

        .tarjeta {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #1e293b;
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .titulo {
            font-size: 26px;
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .barra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .agregar {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .home {
            background: #334155;
        }

        .editar {
            background: linear-gradient(135deg, #2563eb, #1e40af);
        }

        .eliminar {
            background: linear-gradient(135deg, #b91c1c, #7f1d1d);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #1e293b;
        }

        th {
            padding: 14px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        td {
            padding: 12px;
            font-size: 14px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: rgba(30, 41, 59, 0.5);
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>

<div class="contenedor">
    <div class="tarjeta">

        <div class="titulo">Gestión de Productos</div>

        <div class="barra">
            <a href="/productos/nuevo" class="btn agregar">Agregar Producto</a>
            <a href="/home" class="btn home">Volver a Home</a>
        </div>

        <table>
            <thead>
            <tr>
                <th>CÓDIGO</th>
                <th>NOMBRE</th>
                <th>PRECIO</th>
                <th>STOCK</th>
                <th>ESTADO</th>
                <th>ACCIONES</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.codigoProducto}"></td>
                <td th:text="${p.nombreProducto}"></td>
                <td th:text="${p.precio}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.estado ? 'Activo' : 'Inactivo'}"></td>

                <td>
                    <a th:href="@{/productos/editar/{id}(id=${p.codigoProducto})}"
                       class="btn editar">Editar</a>

                    <a th:href="@{/productos/eliminar/{id}(id=${p.codigoProducto})}"
                       class="btn eliminar"
                       onclick="return confirm('¿Eliminar este producto?');">
                        Eliminar
                    </a>
                </td>
            </tr>


            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="6">No hay productos registrados</td>
            </tr>

            </tbody>
        </table>

    </div>
</div>

</body>
</html>
