<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuevo Producto</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #020617, #0f172a);
        min-height: 100vh;
        padding: 30px;
        color: #e2e8f0;
    }

    .contenedor {
        max-width: 600px;
        margin: auto;
    }

    .tarjeta {
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid #1e293b;
        backdrop-filter: blur(12px);
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .titulo {
        font-size: 26px;
        color: #38bdf8;
        font-weight: bold;
        margin-bottom: 20px;
        border-bottom: 1px solid #1e293b;
        padding-bottom: 10px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-size: 13px;
        color: #94a3b8;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: #e2e8f0;
        outline: none;
    }

    input:focus, select:focus {
        border-color: #38bdf8;
    }

    .btn {
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.25s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        opacity: 0.95;
    }

    .guardar {
        background: linear-gradient(135deg, #059669, #047857);
        width: 100%;
        margin-top: 10px;
    }

    .volver {
        background: #334155;
        display: inline-block;
        margin-top: 15px;
        text-align: center;
        width: 100%;
        text-decoration: none;
    }
  </style>
</head>

<body>

<div class="contenedor">
  <div class="tarjeta">

    <div class="titulo">Nuevo Producto</div>

    <form th:action="@{/productos/guardar}" method="post">

      <div class="form-group">
        <label>Nombre del Producto</label>
        <input type="text" name="nombreProducto" required>
      </div>

      <div class="form-group">
        <label>Precio</label>
        <input type="number" step="0.01" name="precio" required>
      </div>

      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" required>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select name="estado">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>

      <button type="submit" class="btn guardar">Guardar Producto</button>

    </form>

    <a th:href="@{/productos}" class="btn volver">Volver</a>

  </div>
</div>

</body>
</html>
