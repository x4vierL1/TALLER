<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #111827);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
        }

        .contenedor {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .tarjeta {
            background: #1f2937;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid #374151;
        }

        .titulo {
            font-size: 24px;
            color: #f9fafb;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitulo {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 25px;
        }

        .campo {
            text-align: left;
            margin-bottom: 15px;
        }

        .campo label {
            display: block;
            font-size: 12px;
            color: #d1d5db;
            margin-bottom: 5px;
        }

        .campo input {
            width: 100%;
            padding: 10px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: #111827;
            color: #f9fafb;
            outline: none;
            transition: 0.2s;
        }

        .campo input:focus {
            border-color: #6b7280;
            box-shadow: 0 0 5px rgba(107, 114, 128, 0.4);
        }

        .boton {
            width: 100%;
            padding: 12px;
            background: #374151;
            border: none;
            border-radius: 8px;
            color: #f9fafb;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .boton:hover {
            background: #4b5563;
        }

        .mensaje.error {
            background: #3f1d1d;
            color: #fca5a5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 12px;
            border: 1px solid #7f1d1d;
        }

        .mensaje.logout {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 12px;
            border: 1px solid #1d4ed8;
        }

        .link {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #9ca3af;
            text-decoration: none;
        }

        .link:hover {
            color: #e5e7eb;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">Iniciar sesión</h2>
        <p class="subtitulo">Ingrese su correo y contraseña.</p>

        <div th:if="${param.error}" class="mensaje error">
            Correo o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="mensaje logout">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="campo">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su correo" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="boton">Ingresar</button>

        </form>

        <a class="link" th:href="@{/register}">¿No tienes cuenta? Crear usuario</a>

    </div>
</div>

</body>
</html>
