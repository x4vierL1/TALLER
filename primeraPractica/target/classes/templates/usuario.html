<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Datos del Usuario</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
            padding: 20px;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            text-align: center;
            animation: aparecer 0.6s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo {
            font-size: 30px;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 15px;
            color: #475569;
            margin-bottom: 30px;
        }

        .datos {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .dato {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px 18px;
            text-align: left;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .dato:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .etiqueta {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .valor {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .lista {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .boton {
            display: inline-block;
            width: 100%;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.35);
        }

        .boton:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 28px 22px;
            }

            .titulo {
                font-size: 25px;
            }

            .valor {
                font-size: 16px;
            }
        }
    </style>

</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h1 class="titulo">Datos del Usuario</h1>
        <p class="subtitulo">Información del usuario mostrado desde thymeleaf</p>

        <div class="datos">
            <div class="dato">
                <span class="etiqueta">Nombre</span>
                <span class="valor" th:text="${Nombre}"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Edad</span>
                <span class="valor" th:text="${Edad}"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Habilidades</span>

                <ul class="lista">
                    <li th:each="hab : ${Habilidades}" th:text="${hab}"></li>
                </ul>

            </div>

            <a class="boton" th:href="@{/datos}">Ir a Datos</a>
            <a class="boton" th:href="@{/home}">Ir a Home</a>
        </div>
    </div>
</div>

</body>
</html>
